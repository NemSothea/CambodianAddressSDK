name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC site
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme CambodiaAddress \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .derivedData

      - name: Transform for static hosting
        run: |
          ARCHIVE=$(find .derivedData -type d -name 'CambodiaAddress.doccarchive' | head -1)
          echo "Archive: $ARCHIVE"
          rm -rf _site
          "$(xcrun --find docc)" process-archive transform-for-static-hosting \
            "$ARCHIVE" \
            --output-path _site \
            --hosting-base-path CambodianAddressSDK
          # Redirect the site root to the documentation landing page.
          echo '<script>location.href="/CambodianAddressSDK/documentation/cambodiaaddress"</script>' > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
